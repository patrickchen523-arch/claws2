<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机制库丨Mechanisms' Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --accent: #f59e0b;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    
    /* Header */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
    }
    
    .tab {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .tab:hover {
      background: var(--bg);
    }
    
    .tab.active {
      background: var(--primary);
      color: white;
    }
    
    /* Main */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    /* Search */
    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    
    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-input:focus {
      border-color: var(--primary);
    }
    
    /* Stats */
    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .stat-num {
      font-weight: 600;
      color: var(--primary);
    }
    
    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      transform: translateY(-2px);
    }
    
    .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    
    .card-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    
    .card-game {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    
    .modal-tags-group {
      margin-bottom: 1rem;
    }
    
    .modal-tags-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .modal-tags-group .card-tags {
      margin-top: 0;
    }
    
    .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: #eff6ff;
      color: var(--primary);
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .tag:hover {
      opacity: 0.8;
    }
    
    .similar-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .similar-item {
      padding: 0.5rem 0.75rem;
      background: #f8fafc;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--text-secondary);
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .modal-section {
      margin-bottom: 1.5rem;
    }
    
    .modal-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    
    .modal-section p {
      color: var(--text);
    }
    
    .modal-link {
      color: var(--primary);
      cursor: pointer;
      text-decoration: underline;
    }
    
    .modal-link:hover {
      color: var(--primary-light);
    }
    
    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 1rem 0;
      flex-wrap: wrap;
    }
    
    .page-btn {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 40px;
    }
    
    .page-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .page-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    /* Hidden */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-icon">🔐</div>
      <h2>机制库访问</h2>
      <p>请输入访问密码</p>
      <input type="password" id="loginPassword" placeholder="请输入密码" />
      <button onclick="checkPassword()">进入</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>
  
  <script>
    // Password protection
    const CORRECT_PASSWORD = 'guestpw4mechanism';
    let isLoggedIn = false;
    
    function checkPassword() {
      const input = document.getElementById('loginPassword').value;
      const error = document.getElementById('loginError');
      
      if (input === CORRECT_PASSWORD) {
        isLoggedIn = true;
        document.getElementById('loginOverlay').classList.add('hidden');
        localStorage.setItem('mechanism_lib_logged_in', 'true');
      } else {
        error.textContent = '密码错误，请重试';
        document.getElementById('loginPassword').value = '';
      }
    }
    
    // Check if already logged in
    if (localStorage.getItem('mechanism_lib_logged_in') === 'true') {
      isLoggedIn = true;
      document.getElementById('loginOverlay').classList.add('hidden');
    }
    
    // Enter key support
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
  
  <style>
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .login-overlay.hidden {
      display: none;
    }
    
    .login-box {
      background: white;
      padding: 2.5rem;
      border-radius: 16px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    
    .login-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .login-box h2 {
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .login-box > p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    
    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;

    }
    
    .login-box input:focus {

    .login-box button {

  </style>
  
  <header>
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span>机制库</span>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="mechanisms">机制库</button>
        <button class="tab" data-tab="games">游戏库</button>
      </div>
    </div>
  </header>
  
  <main>
    <div class="search-bar">
      <input type="text" class="search-input" id="searchInput" placeholder="搜索... (多个关键词用空格分隔，支持交集搜索)">
    </div>
    
    <div class="stats">
      <div class="stat-item">
        <span class="stat-num" id="mechCount">0</span> 个机制
      </div>
      <div class="stat-item">
        <span class="stat-num" id="gameCount">0</span> 个游戏
      </div>
    </div>
    
    <div class="grid" id="grid"></div>
    
    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
    
    <div class="empty hidden" id="empty">
      <p>没有找到相关内容</p>
    </div>
  </main>
  
  <!-- Mechanism Modal -->
  <div class="modal-overlay" id="mechModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="mechModalTitle"></div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="mechModalBody"></div>
    </div>
  </div>
  
  <!-- Game Modal -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="gameModalTitle"></div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="gameModalBody"></div>
    </div>
  </div>
  
  <script>
    let data = { mechanisms: {}, games: {}, stats: {} };
    let currentTab = 'mechanisms';
    let currentPage = 1;
    const PAGE_SIZE = 40;
    let filteredData = [];
    
    // Load data
    async function loadData() {
      const response = await fetch('data.json?v=1773715964');
      data = await response.json();
      renderStats();
      renderGrid();
    }
    
    function renderStats() {
      document.getElementById('mechCount').textContent = data.stats.mechanismCount;
      document.getElementById('gameCount').textContent = data.stats.gameCount;
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        currentPage = 1; // 重置到第一页
        renderGrid();
      });
    });
    
    // Search
    document.getElementById('searchInput').addEventListener('input', renderGrid);
    
    // 渲染卡片标签 - 支持新标签系统，显示所有标签
    function renderCardTags(m) {
      const tags = [];
      
      // 玩法层级 - 全部显示
      if (m.playLevelTags && m.playLevelTags.length > 0) {
        tags.push(...m.playLevelTags);
      }
      // 机制设计 - 全部显示
      if (m.mechanismDesign && m.mechanismDesign.length > 0) {
        tags.push(...m.mechanismDesign);
      }
      // 特色机制 - 全部显示
      if (m.specialMechanisms && m.specialMechanisms.length > 0) {
        tags.push(...m.specialMechanisms);
      }
      // 玩家痛点 - 全部显示
      if (m.painPoints && m.painPoints.length > 0) {
        tags.push(...m.painPoints);
      }
      
      // 如果没有新标签，回退到旧 tags
      if (tags.length === 0 && m.tags && m.tags.length > 0) {
        tags.push(...m.tags);
      }
      
      return tags.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('');
    }
    
    function getFilteredData() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      
      if (currentTab === 'mechanisms') {
        return Object.entries(data.mechanisms).filter(([key, m]) => {
          // 多个关键词用空格分隔，支持交集搜索
          const keywords = query.trim().split(/\s+/).filter(k => k);
          
          // 收集所有可能的标签字段
          const allTags = [
            ...(m.tags || []),
            ...(m.flatTags || []),
            ...(m.playLevelTags || []),
            ...(m.mechanismDesign || []),
            ...(m.specialMechanisms || []),
            ...(m.painPoints || [])
          ];
          
          const matchQuery = keywords.length === 0 || keywords.every(kw => 
            m.title.toLowerCase().includes(kw) ||
            m.gameName?.toLowerCase().includes(kw) ||
            m.simpleDesc?.toLowerCase().includes(kw) ||
            allTags.some(t => t.toLowerCase().includes(kw))
          );
          return matchQuery;
        });
      } else {
        return Object.entries(data.games).filter(([key, g]) => {
          const matchQuery = !query ||
            g.title.toLowerCase().includes(query) ||
            g.gameName?.toLowerCase().includes(query) ||
            g.xStatement?.toLowerCase().includes(query);
          return matchQuery;
        });
      }
    }
    
    function renderPagination(totalItems) {
      const pagination = document.getElementById('pagination');
      const totalPages = Math.ceil(totalItems / PAGE_SIZE);
      
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }
      
      let html = '';
      
      // 上一页
      html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      
      // 页码
      const maxVisiblePages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
      
      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }
      
      // 第一页
      if (startPage > 1) {
        html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<span style="padding: 0.5rem;">...</span>`;
      }
      
      // 中间页码
      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      
      // 最后一页
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span style="padding: 0.5rem;">...</span>`;
        html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      // 下一页
      html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      // 总数信息
      html += `<span style="margin-left: 1rem; color: var(--text-secondary); font-size: 0.9rem;">共 ${totalItems} 条</span>`;
      
      pagination.innerHTML = html;
    }
    
    function goToPage(page) {
      currentPage = page;
      renderGrid();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function renderGrid() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      filteredData = getFilteredData();
      
      if (filteredData.length === 0) {
        grid.innerHTML = '';
        document.getElementById('pagination').innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      
      // 分页切片
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageData = filteredData.slice(start, end);
      
      // 渲染分页控件
      renderPagination(filteredData.length);
      
      if (currentTab === 'mechanisms') {
        grid.innerHTML = pageData.map(([key, m]) => `
          <div class="card" onclick="showMechanism('${key}')">
            <div class="card-header">
              <div class="card-title">${m.title}</div>
              <div class="card-meta">
                ${m.gameName ? `<div class="card-game">${m.gameName}</div>` : ''}
              </div>
            </div>
            <div class="card-desc">${m.simpleDesc || '暂无描述'}</div>
            <div class="card-tags">
              ${renderCardTags(m)}
            </div>
          </div>
        `).join('');
      } else {
        grid.innerHTML = pageData.map(([key, g]) => `
          <div class="card" onclick="showGame('${key}')">
            <div class="card-header">
              <div class="card-title">${g.gameName || g.title}</div>
              <div class="card-meta">
                <div class="card-game">${g.genre || '未知'}</div>
              </div>
            </div>
            <div class="card-desc">${g.xStatement || '暂无 X-Statement'}</div>
          </div>
        `).join('');
      }
    }
    
    // Modal functions
    // 标签点击搜索功能 - 在弹窗中也能搜索
    function searchByTag(tag) {
      closeModal(); // 关闭弹窗
      
      // 切换到机制库 Tab
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('.tab[data-tab="mechanisms"]').classList.add('active');
      currentTab = 'mechanisms';
      currentPage = 1; // 重置到第一页
      
      // 设置搜索框并直接触发搜索
      const searchInput = document.getElementById('searchInput');
      searchInput.value = tag + ' ';
      renderGrid(); // 直接调用确保更新
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function showMechanism(key) {
      closeModal(); // 关闭现有弹窗
      
      const m = data.mechanisms[key];
      document.getElementById('mechModalTitle').textContent = m.title;
      
      let html = '';
      
      // 来源游戏 - 检查游戏库中是否存在
      if (m.gameName) {
        // 标准化匹配函数
        const normalize = (s) => s.replace(/[,/\\].*$/, '').trim().toLowerCase();
        const normMechName = normalize(m.gameName);
        
        // 查找是否有对应的游戏卡
        const gameExists = Object.values(data.games).some(g => {
          const normGameName = normalize(g.gameName || '');
          return g.title.toLowerCase().includes(m.gameName.toLowerCase()) ||
                 g.gameName?.toLowerCase().includes(m.gameName.toLowerCase()) ||
                 normalize(g.title).includes(normMechName) ||
                 normGameName.includes(normMechName);
        });
        
        if (gameExists) {
          html += `
            <div class="modal-section">
              <h3>来源游戏</h3>
              <p><span class="modal-link" onclick="showGameByName('${m.gameName}')">${m.gameName}</span></p>
            </div>
          `;
        } else {
          html += `
            <div class="modal-section">
              <h3>来源游戏</h3>
              <p>${m.gameName}</p>
            </div>
          `;
        }
      }
      
      // 一句话解释
      if (m.simpleDesc) {
        html += `
          <div class="modal-section">
            <h3>一句话解释</h3>
            <p>${m.simpleDesc}</p>
          </div>
        `;
      }
      
      // 机制描述
      if (m.mechanismDesc) {
        const mechDescHtml = m.mechanismDesc.replace(/\n/g, '<br>');
        html += `
          <div class="modal-section">
            <h3>机制描述</h3>
            <p>${mechDescHtml}</p>
          </div>
        `;
      }
      
      // 核心规则
      if (m.coreRules) {
        html += `
          <div class="modal-section">
            <h3>核心规则</h3>
            <p>${m.coreRules}</p>
          </div>
        `;
      }
      
      // 触发条件
      if (m.trigger) {
        html += `
          <div class="modal-section">
            <h3>触发条件</h3>
            <p>${m.trigger}</p>
          </div>
        `;
      }
      
      // 解决痛点
      if (m.painPoint) {
        html += `
          <div class="modal-section">
            <h3>解决痛点</h3>
            <p>${m.painPoint}</p>
          </div>
        `;
      }
      
      // 体验目标
      if (m.experienceGoal) {
        html += `
          <div class="modal-section">
            <h3>体验目标</h3>
            <p>${m.experienceGoal}</p>
          </div>
        `;
      }
      
      // 相似机制 - 每行一个，格式【游戏-机制】，点击跳转到对应机制
      if (m.similarMechanisms && m.similarMechanisms.length > 0) {
        const similarHtml = m.similarMechanisms
          .filter(s => s && (s.mechanism || s.game))
          .map(similar => {
            const gameName = similar.game || '';
            const mechanismName = similar.mechanism || '';
            
            if (!gameName && !mechanismName) return '';
            
            // 尝试在机制库中查找匹配的机制（根据游戏名+机制名）
            const mechEntry = Object.entries(data.mechanisms).find(([key, mech]) => {
              if (gameName && mech.gameName) {
                return mech.gameName.toLowerCase().includes(gameName.toLowerCase()) &&
                       mech.title.toLowerCase().includes(mechanismName.toLowerCase());
              }
              return mech.title.toLowerCase().includes(mechanismName.toLowerCase());
            });
            
            const display = gameName ? `【${gameName}】${mechanismName}` : mechanismName;
            
            if (mechEntry) {
              return `<div class="similar-item"><span class="modal-link" onclick="showMechanism('${mechEntry[0]}')">${display}</span></div>`;
            } else {
              return `<div class="similar-item">${display}</div>`;
            }
          })
          .join('');
        
        if (similarHtml) {
          html += `
            <div class="modal-section">
              <h3>相似机制</h3>
              <div class="similar-list">${similarHtml}</div>
            </div>
          `;
        }

      // 新标签系统：每个标签单独展示
      let tagHtml = '';
      
      // 玩法层级
      if (m.playLevelTags && m.playLevelTags.length > 0) {
        tagHtml += `
          <div class="modal-tags-group">
            <div class="modal-tags-label">🎮 玩法层级</div>
            <div class="card-tags">
              ${m.playLevelTags.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('')}
            </div>
          </div>
        `;
      }
      
      // 机制设计
      if (m.mechanismDesign && m.mechanismDesign.length > 0) {
        tagHtml += `
          <div class="modal-tags-group">
            <div class="modal-tags-label">⚙️ 机制设计</div>
            <div class="card-tags">
              ${m.mechanismDesign.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('')}

          </div>
        `;
      }
      
      // 特色机制
      if (m.specialMechanisms && m.specialMechanisms.length > 0) {
        tagHtml += `
          <div class="modal-tags-group">
            <div class="modal-tags-label">✨ 特色机制</div>
            <div class="card-tags">
              ${m.specialMechanisms.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('')}

          </div>

      }
      
      // 玩家痛点
      if (m.painPoints && m.painPoints.length > 0) {
        tagHtml += `
          <div class="modal-tags-group">
            <div class="modal-tags-label">🎯 玩家痛点</div>
            <div class="card-tags">
              ${m.painPoints.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('')}
            </div>
          </div>
        `;
      }
      
      if (tagHtml) {
        html += `
          <div class="modal-section">
            <h3>🏷️ 标签信息</h3>
            ${tagHtml}
          </div>
        `;
      }
      
      if (!html) {
        html = '<p>暂无详细信息</p>';
      }
      
      document.getElementById('mechModalBody').innerHTML = html;
      document.getElementById('mechModal').classList.add('active');
    }
    
    function showGame(key) {
      closeModal(); // 关闭现有弹窗
      
      const g = data.games[key];
      if (!g) return;
      
      document.getElementById('gameModalTitle').textContent = g.title;
      
      let html = '';
      
      // X-Statement
      if (g.xStatement) {
        html += `
          <div class="modal-section">
            <h3>X-Statement</h3>
            <p>${g.xStatement}</p>
          </div>
        `;
      }
      
      // 一句话对标
      if (g.tagline) {
        html += `
          <div class="modal-section">
            <h3>一句话对标</h3>
            <p>${g.tagline}</p>
          </div>
        `;
      }
      
      // 玩家数据
      if (g.playerStats) {
        html += `
          <div class="modal-section">
            <h3>玩家数据</h3>
            <p>${g.playerStats}</p>
          </div>
        `;
      }
      
      // 基本信息
      const basicInfo = [];
      if (g.developer) basicInfo.push(`开发者: ${g.developer}`);
      if (g.publisher) basicInfo.push(`发行商: ${g.publisher}`);
      if (g.platform) basicInfo.push(`平台: ${g.platform}`);
      if (g.releaseDate) basicInfo.push(`上线时间: ${g.releaseDate}`);
      if (g.genre) basicInfo.push(`游戏类型: ${g.genre}`);
      if (g.monetization) basicInfo.push(`收费模式: ${g.monetization}`);
      
      if (basicInfo.length > 0) {
        html += `
          <div class="modal-section">
            <h3>基本信息</h3>
            <p>${basicInfo.join('<br>')}</p>
          </div>
        `;
      }
      
      // 核心支柱
      if (g.pillars && g.pillars.length > 0) {
        html += `
          <div class="modal-section">
            <h3>核心支柱</h3>
            ${g.pillars.map(p => `
              <div style="margin-bottom: 1rem;">
                <strong>${p.title}</strong><br>
                <span style="color: var(--text-secondary); font-size: 0.9em;">${p.experience}</span>
              </div>
            `).join('')}
          </div>
        `;
      }
      
      // 收录机制（关联跳转）
      if (g.relatedMechanisms && g.relatedMechanisms.length > 0) {
        const mechHtml = g.relatedMechanisms.map(mechRef => {
          // mechRef 格式: [品类]-游戏名-机制名
          // 提取机制名
          const cleanRef = mechRef.replace(/[\[\]]/g, '');
          const parts = cleanRef.split('-');
          const targetMechName = parts.length >= 3 ? parts.slice(2).join('-') : cleanRef;
          
          // 在机制库中查找匹配 - 主要通过机制名匹配
          const mechEntry = Object.entries(data.mechanisms).find(([key, m]) => {
            if (!m.title) return false;
            // 检查机制标题是否包含目标机制名
            return m.title.includes(targetMechName) || targetMechName.includes(m.title);
          });
          
          if (mechEntry) {
            return `<div class="similar-item"><span class="modal-link" onclick="showMechanism('${mechEntry[0]}')">${mechRef}</span></div>`;
          } else {
            return `<div class="similar-item">${mechRef}</div>`;
          }
        }).join('');
        
        html += `
          <div class="modal-section">
            <h3>收录机制</h3>
            <div class="similar-list">${mechHtml}</div>
          </div>
        `;
      }
      
      if (!html) {
        html = '<p>暂无详细信息</p>';
      }
      
      document.getElementById('gameModalBody').innerHTML = html;
      document.getElementById('gameModal').classList.add('active');
    }

    function showGameByName(gameName) {
      if (!gameName) return;
      
      // 标准化游戏名：移除逗号、斜杠等分隔符，统一为空格
      const normalize = (s) => s.replace(/[,/\\].*$/, '').trim().toLowerCase();
      const normInput = normalize(gameName);
      
      // 尝试提取有效的游戏名进行匹配
      const namesToTry = [];
      
      // 1. 直接用原名
      namesToTry.push(gameName);
      
      // 2. 清理逗号/斜杠分隔的多个名字
      if (gameName.includes(',') || gameName.includes('/')) {
        gameName.split(/[,/]/).forEach(n => namesToTry.push(n.trim()));
      }
      
      // 3. 提取第一个有效名字（通常是英文名）
      const firstName = gameName.split(/[,/]/)[0].trim();
      if (firstName) namesToTry.push(firstName);
      
      // 尝试每个名字
      for (const name of namesToTry) {
        // 先尝试映射表
        if (GAME_NAME_MAP[name] && data.games[GAME_NAME_MAP[name]]) {
          showGame(GAME_NAME_MAP[name]);
          return;
        }
        
        // 再尝试模糊匹配
        const entry = Object.entries(data.games).find(([key, g]) => 
          g.title.toLowerCase().includes(name.toLowerCase()) ||
          g.gameName?.toLowerCase().includes(name.toLowerCase()) ||
          normalize(g.gameName) === normInput
        );
        if (entry) {
          showGame(entry[0]);
          return;
        }
      }
    }
    
    function closeModal() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    }
    
    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
      });
    });
    
    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    // Init
    loadData();
