<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机制库丨Mechanisms' Library</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary: #FF6600;
      --primary-light: #FF8533;
      --bg: #1A1A2E;
      --card-bg: #25253E;
      --text: #F0F0F0;
      --text-secondary: #A0A0B8;
      --border: #3A3A55;
      --accent: #FF6600;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    
    /* Header */
    header {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1rem;
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
    }
    
    .tab {
      padding: 0.5rem 1.25rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    
    .tab:hover {
      background: var(--bg);
    }
    
    .tab.active {
      background: var(--primary);
      color: white;
    }
    
    /* Main */
    main {
      max-width: 80%;
      margin: 0 auto;
      padding: 1rem 0;
      position: relative;
    }
    
    .main-content {
      display: flex;
      gap: 1rem;
    }
    
    .filter-panel {
      width: 260px;
      flex-shrink: 0;
      max-height: calc(100vh - 140px);
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      overflow-y: auto;
      position: sticky;
      top: 100px;
      align-self: flex-start;
    }
    
    .filter-panel.hidden {
      display: none;
    }
    
    .main-right {
      flex: 1;
      min-width: 0;
    }
    
    /* App Layout - sidebar + main-area */
    .app-layout {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      position: sticky;
      top: 80px;
      align-self: flex-start;
    }
    
    .sidebar-header {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .sidebar-more-btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      padding: 0.4rem 0.5rem;
      cursor: pointer;
      margin: 0.5rem 0;
      text-align: left;
      transition: background 0.2s;
    }
    
    .sidebar-more-btn:hover {
      background: rgba(255,102,0,0.1);
    }
    
    .sidebar-extra-filters.hidden {
      display: none;
    }
    
    .filter-clear {
      display: block;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      cursor: pointer;
      margin-top: 0.5rem;
      text-decoration: underline;
    }
    
    .filter-clear:hover {
      color: var(--primary);
    }
    
    .main-area {
      flex: 1;
      min-width: 0;
      margin-right: 256px;  /* 为 fixed latest-sidebar 留出空间：240px + 16px gap */
    }
    
    .content-area {
      display: block;
    }
    
    .latest-sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      position: fixed;
      top: 80px;        /* JS 会精确覆盖此值 */
      right: 10vw;
      overflow: visible;
      z-index: 50;
    }
    
    /* content-area 不再需要额外 margin-right（latest-sidebar 已 fixed） */
    
    .latest-header {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .latest-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .latest-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .latest-item:hover {
      background-color: rgba(255, 102, 0, 0.1);
    }
    
    .latest-item-icon {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 6px;
      background: linear-gradient(135deg, #FF6600, #FF8533);
    }
    
    .latest-item-content {
      flex: 1;
      min-width: 0;
    }
    
    .latest-item-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }
    
    .latest-item-game {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
      word-wrap: break-word;
      overflow-wrap: break-word;
      white-space: normal;
    }

    /* Search */
    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
      align-items: center;
      padding: 0;
    }
    
    .search-input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      max-width: calc(100% - 100px);
    }
    
    .search-input:focus {
      border-color: var(--primary);
    }
    
    .filter-btn {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    
    .filter-btn:hover {
      background: var(--bg);
    }
    
    .filter-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .filter-header span:first-child {
      font-weight: 600;
    }
    
    .filter-clear {
      color: var(--primary);
      cursor: pointer;
      font-size: 0.85rem;
    }
    
    .filter-category {
      margin-bottom: 1rem;
    }
    
    .filter-category-title {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    
    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    
    .filter-tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-tag:hover {
      border-color: var(--primary);
    }
    
    .filter-tag.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .filter-tag-count {
      color: var(--text-secondary);
      font-size: 0.7rem;
      margin-left: 0.25rem;
    }

    /* Category Bar */
    .category-bar {
      padding: 0.5rem 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
    }
    
    .category-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-bottom: 0.25rem;
    }
    
    .category-tab {
      flex-shrink: 0;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    
    .category-tab:hover {
      border-color: var(--primary);
      background: var(--card-bg);
    }
    
    .category-tab.active {
      background: var(--primary) !important;
      color: white !important;
      border-color: var(--primary) !important;
    }
    
    .category-subtags {
      padding: 0.5rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      background: var(--bg);
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-top: 0.5rem;
    }
    
    .category-subtags.hidden {
      display: none;
    }
    
    .category-subtag {
      font-size: 0.8rem;
      padding: 0.35rem 0.7rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .category-subtag:hover {
      border-color: var(--primary);
      background: rgba(255, 102, 0, 0.1);
    }
    
    .category-subtag.selected {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    /* 品类 tab 的括号计数 */
    .genre-count {
      font-size: 0.75em;
      color: var(--text-secondary);
      margin-left: 2px;
    }
    
    .category-tab.genre-tab.active .genre-count {
      color: rgba(255, 255, 255, 0.75);
    }
    
    /* Stats */
    .stats {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      padding: 0;
    }
    
    .stat-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .stat-num {
      font-weight: 600;
      color: var(--primary);
    }
    
    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding: 0;
    }
    
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(255, 102, 0, 0.2);
      transform: translateY(-2px);
    }
    
    .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    
    .card-meta {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    
    .card-game {
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    
    .card-cover {
      width: 100%;
      height: 120px;
      border-radius: 8px;
      margin-bottom: 0.75rem;
      overflow: hidden;
      position: relative;
    }
    
    .card-cover-gradient {
      width: 100%;
      height: 100%;
    }
    
    .modal-tags-group {
      margin-bottom: 1rem;
    }
    
    .modal-tags-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    
    .modal-tags-group .card-tags {
      margin-top: 0;
    }
    
    .tag {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      background: rgba(255, 102, 0, 0.2);
      color: var(--primary);
      border-radius: 4px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .tag:hover {
      opacity: 0.8;
    }
    
    .similar-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    
    .similar-item {
      padding: 0.5rem 0.75rem;
      background: var(--card-bg);
      border-radius: 6px;
      font-size: 0.9rem;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: var(--card-bg);
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid var(--border);
    }
    
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--bg);
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--text-secondary);
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .modal-section {
      margin-bottom: 1.5rem;
    }
    
    .modal-section h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    
    .modal-section p {
      color: var(--text);
    }
    
    .modal-link {
      color: var(--primary);
      cursor: pointer;
      text-decoration: underline;
    }
    
    .modal-link:hover {
      color: var(--primary-light);
    }
    
    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 1rem;
      flex-wrap: wrap;
    }
    
    .page-btn {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 40px;
    }
    
    .page-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .page-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    
    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Empty state */
    .empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }
    
    /* Hidden */
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div class="login-icon">🔐</div>
      <h2>机制库访问</h2>
      <p>请输入访问密码</p>
      <input type="password" id="loginPassword" placeholder="请输入密码" />
      <button onclick="checkPassword()">进入</button>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>
  
  <script>
    // Password protection
    const CORRECT_PASSWORD = 'guestpw4mechanism';
    let isLoggedIn = false;
    
    function checkPassword() {
      const input = document.getElementById('loginPassword').value;
      const error = document.getElementById('loginError');
      
      if (input === CORRECT_PASSWORD) {
        isLoggedIn = true;
        document.getElementById('loginOverlay').classList.add('hidden');
        localStorage.setItem('mechanism_lib_logged_in', 'true');
      } else {
        error.textContent = '密码错误，请重试';
        document.getElementById('loginPassword').value = '';
      }
    }
    
    // Check if already logged in
    if (localStorage.getItem('mechanism_lib_logged_in') === 'true') {
      isLoggedIn = true;
      document.getElementById('loginOverlay').classList.add('hidden');
    }
    
    // Enter key support
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>
  
  <style>
    .login-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1A1A2E 0%, #16162A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    
    .login-overlay.hidden {
      display: none;
    }
    
    .login-box {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 16px;
      text-align: center;
      max-width: 360px;
      width: 90%;
    }
    
    .login-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    
    .login-box h2 {
      margin-bottom: 0.5rem;
      color: var(--text);
    }
    
    .login-box > p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }
    
    .login-box input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 1rem;
    }
    
    .login-box input::placeholder {
      color: var(--text-secondary);
    }
    
    .login-box input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .login-box button {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .login-box button:hover {
      background: var(--primary-light);
    }
    
    .login-error {
      color: #dc2626;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
  </style>
  
  <header>
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <span>机制库</span>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="mechanisms">机制库</button>
        <button class="tab" data-tab="games">游戏库</button>
      </div>
    </div>
  </header>
  
  <main>
    <div class="app-layout">
      <!-- 左侧筛选边栏 -->
      <aside class="sidebar" id="filterPanel">
        <div class="sidebar-header">🏷️ 筛选</div>
        <div class="sidebar-quick-filters" id="filterBody"></div>
        <button class="sidebar-more-btn" onclick="toggleFilter()">更多筛选 ▼</button>
        <div class="sidebar-extra-filters hidden" id="extraFilters"></div>
        <span class="filter-clear" onclick="clearFilter()">清除筛选</span>
      </aside>

      <div class="main-area">
        <!-- Search Bar -->
        <div class="search-bar">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索... (多个关键词用空格分隔)">
          <button class="filter-btn" id="filterBtn" onclick="toggleFilter()" style="display:none">更多筛选</button>
        </div>
        
        <!-- Category Bar：只显示品类筛选，其他筛选在左侧边栏 -->
        <div class="category-bar" id="categoryBar">
          <div class="category-tabs" id="genreTabsInsertPoint">
            <!-- 品类 tabs 由 renderGenreTabs() 动态生成 -->
          </div>
          <div class="category-subtags hidden" id="categorySubtags"></div>
        </div>

        <div class="stats">
          <div class="stat-item">
            <span class="stat-num" id="mechCount">0</span> 个机制
          </div>
          <div class="stat-item">
            <span class="stat-num" id="gameCount">0</span> 个游戏
          </div>
        </div>
        
        <div class="content-area">
          <div class="grid" id="grid"></div>
          
          <!-- Latest Mechanisms Sidebar -->
          <aside class="latest-sidebar">
            <div class="latest-header">📋 最新机制</div>
            <div class="latest-list" id="latestList"></div>
          </aside>
        </div>
        
        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
        
        <div class="empty hidden" id="empty">
          <p>没有找到相关内容</p>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Mechanism Modal -->
  <div class="modal-overlay" id="mechModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="mechModalTitle"></div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="mechModalBody"></div>
    </div>
  </div>
  
  <!-- Game Modal -->
  <div class="modal-overlay" id="gameModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="gameModalTitle"></div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="gameModalBody"></div>
    </div>
  </div>
  
  <script>
    let data = { mechanisms: {}, games: {}, stats: {} };
    let allData = null; // 存储完整的 data.json 用于封面图查询
    let currentTab = 'mechanisms';
    let currentPage = 1;
    const PAGE_SIZE = 12;
    let filteredData = [];
    let selectedFilters = {}; // 选中的筛选标签 { '玩法层级-对抗类型': ['PVP'], ... }
    let coverMap = {}; // 游戏封面映射 { gameName: 'https://...' }
    
    // Load data
    async function loadData() {
      const response = await fetch('data.json?v=' + Date.now());
      data = await response.json();
      allData = data; // 用于 getCoverUrl 访问
      
      // Load covers mapping with silent fallback
      try {
        const coversResponse = await fetch('covers.json?v=' + Date.now());
        if (coversResponse.ok) {
          coverMap = await coversResponse.json();
        }
      } catch (e) {
        // Silent fallback: covers.json not found or error, use empty coverMap
        coverMap = {};
      }
      
      renderStats();
      renderFilterPanel();
      renderGrid();
      renderGenreTabs();   // 品类 tabs 依赖数据，在 loadData 后渲染
      initCategoryBar();
      renderLatestMechanisms();
      alignLatestSidebar();
    }
    
    // ─── 品类归一化 ─────────────────────────────────────────────────────────
    // 每个条目：{ label, emoji, variants[] }
    // variants 对应 data.json mechanismDesignCategory 字段里的原始值
    // 前置耳熟能详的品类，其余按数量排序
    const GENRE_GROUPS = [
      { label: 'MOBA',     emoji: '⚔️',  variants: ['MOBA', 'MOBA-5v5'] },
      { label: 'FPS/射击', emoji: '🔫',  variants: ['射击-搜打撤', '射击-大逃杀', '射击-战术竞技', 'FPS-撤离射击', '射击'] },
      { label: '竞速',     emoji: '🏎️',  variants: ['竞速-街机竞速'] },
      { label: 'RPG',      emoji: '⚔',   variants: ['RPG-ARPG', 'RPG - ARPG', 'RPG-MMORPG', 'MMORPG', 'RPG', 'JRPG', 'RPG-角色定制', '放置RPG'] },
      { label: 'SLG/策略', emoji: '🗺️',  variants: ['策略-SLG', 'SLG', '策略-RTS', 'RTS', '策略-自走棋', '策略-战棋', '策略-塔防', '策略-策略卡牌'] },
      { label: '卡牌',     emoji: '🃏',  variants: ['卡牌-策略卡牌', '策略卡牌', '卡牌-CCG', 'Roguelike-卡牌构筑'] },
      { label: 'Roguelike',emoji: '🎲',  variants: ['Roguelike'] },
      { label: '模拟经营', emoji: '🏙️',  variants: ['模拟经营-养成', '模拟经营', '模拟经营-城建', '模拟经营-自动化生产', '模拟经营-三消融合'] },
      { label: '动作',     emoji: '👊',  variants: ['街机动作', '街机-动作', '格斗-3D格斗', '街机-格斗', '动作'] },
      { label: '冒险',     emoji: '🗺',  variants: ['冒险游戏', '冒险社交'] },
      { label: '音游',     emoji: '🎵',  variants: ['音游'] },
    ];
    
    // 计算每个品类有多少张机制卡
    function countGenreCards(variants) {
      return Object.values(data.mechanisms).filter(m => {
        const cats = m.mechanismDesignCategory || [];
        return variants.some(v => cats.includes(v));
      }).length;
    }
    
    // 渲染品类 tabs，插入到占位点
    function renderGenreTabs() {
      const insertPoint = document.getElementById('genreTabsInsertPoint');
      if (!insertPoint) return;
      
      const fragment = document.createDocumentFragment();
      
      // 添加 ALL 按钮
      const allBtn = document.createElement('button');
      allBtn.className = 'category-tab genre-tab active';
      allBtn.innerHTML = '🎯 全部';
      allBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        // 移除所有 tab 的 active
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        delete selectedFilters['__genre__'];
        currentPage = 1;
        renderGrid();
      });
      fragment.appendChild(allBtn);
      
      GENRE_GROUPS.forEach(genre => {
        const count = countGenreCards(genre.variants);
        if (count === 0) return;  // 无数据的品类暂时跳过
        
        const btn = document.createElement('button');
        btn.className = 'category-tab genre-tab';
        btn.dataset.genreLabel = genre.label;
        btn.innerHTML = genre.emoji + ' ' + genre.label + ' <span class="genre-count">(' + count + ')</span>';
        btn.addEventListener('click', function() {
          toggleGenreTab(this);
        });
        fragment.appendChild(btn);
      });
      
      insertPoint.appendChild(fragment);
    }
    
    // 切换品类 tab（品类筛选逻辑与普通 categoryTab 不同：直接过滤卡片）
    function toggleGenreTab(tabElement) {
      const genreLabel = tabElement.dataset.genreLabel;
      const isAlreadyActive = tabElement.classList.contains('active');
      
      // 移除所有 tab 的 active
      document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
      document.getElementById('categorySubtags').classList.add('hidden');
      
      if (isAlreadyActive) {
        // 再次点击 = 取消该品类筛选
        delete selectedFilters['__genre__'];
        currentPage = 1;
        renderGrid();
        return;
      }
      
      // 激活
      tabElement.classList.add('active');
      
      // 找到对应的 variants
      const genre = GENRE_GROUPS.find(g => g.label === genreLabel);
      if (!genre) return;
      
      // 使用专用的品类筛选 key
      selectedFilters['__genre__'] = { label: genreLabel, variants: genre.variants };
      currentPage = 1;
      renderGrid();
    }
    
    // 让 latest-sidebar 顶部与左侧 sidebar 顶部对齐
    function alignLatestSidebar() {
      const sidebar = document.getElementById('filterPanel');
      const latestSidebar = document.querySelector('.latest-sidebar');
      if (!sidebar || !latestSidebar) return;
      const rect = sidebar.getBoundingClientRect();
      latestSidebar.style.top = Math.round(rect.top + window.scrollY) + 'px';
    }
    
    // 获取游戏封面URL，支持中英文名映射
    // 优先级：1. covers.json 2. data.json 中的 coverImage
    function getCoverUrl(gameName) {
      if (!gameName) return null;
      
      // 1. 直接查找 coverMap (covers.json)
      if (coverMap[gameName]) {
        return coverMap[gameName];
      }
      
      // 2. 通过 GAME_NAME_MAP 查找别名
      const mappedKey = GAME_NAME_MAP[gameName];
      if (mappedKey && coverMap[mappedKey]) {
        return coverMap[mappedKey];
      }
      
      // 3. 尝试通过反向映射查找
      for (const [displayName, key] of Object.entries(GAME_NAME_MAP)) {
        if (key === gameName && coverMap[displayName]) {
          return coverMap[displayName];
        }
      }
      
      // 4. 从 data.json 的 games 中查找
      if (allData && allData.games) {
        // 精确匹配
        const game = allData.games[gameName] || allData.games[gameName.replace(/\s/g, '')];
        if (game && game.coverImage && game.coverImage.includes('http')) {
          return game.coverImage;
        }
        // 模糊匹配
        for (const [key, g] of Object.entries(allData.games)) {
          if (g.title && g.title.includes(gameName) && g.coverImage && g.coverImage.includes('http')) {
            return g.coverImage;
          }
        }
      }
      
      return null;
    }
    
    // 根据游戏名hash生成唯一渐变色
    function gameNameToGradient(name) {
      if (!name) name = 'default';
      
      // 简单hash算法：求和所有字符码，取模360得到hue
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash += name.charCodeAt(i);
      }
      const hue = hash % 360;
      const hue2 = (hue + 40) % 360;
      
      return `linear-gradient(135deg, hsl(${hue}, 60%, 25%), hsl(${hue2}, 60%, 15%))`;
    }
    
    // 渲染最新机制列表（只显示5条，不滚动）
    function renderLatestMechanisms() {
      const latestList = document.getElementById('latestList');
      if (!latestList) return;
      
      // 取最后5条，逆序排列
      const allMechanisms = Object.entries(data.mechanisms).slice(-5).reverse();
      
      if (allMechanisms.length === 0) {
        latestList.innerHTML = '<div class="latest-item"><p style="color: var(--text-secondary);">暂无机制</p></div>';
        return;
      }
      
      latestList.innerHTML = allMechanisms.map(([key, m]) => `
        <div class="latest-item" onclick="showMechanism('${key}')">
          <div class="latest-item-icon" style="background: ${gameNameToGradient(m.gameName || m.title)}"></div>
          <div class="latest-item-content">
            <div class="latest-item-title">${m.title}</div>
            <div class="latest-item-game">${m.gameName || '未知'}</div>
          </div>
        </div>
      `).join('');
    }

    // 渲染筛选面板 - 使用分类后的标签
    function renderFilterPanel() {
      const categories = buildCategoriesData();
      const catTitles = {
        '玩法层级-对抗类型': '🎮 对抗类型',
        '玩法层级-玩法规模': '👥 玩法规模',
        '玩法层级-内容消耗模式': '🔄 内容消耗',
        '解决痛点': '🎯 解决痛点',
        '玩法层级-操作属性': '🕹️ 操作属性',
        '玩法层级-时间属性': '⏱️ 时间属性',
        '玩法层级-玩法重度': '⚡ 玩法重度',
        '玩法层级-玩法独立性': '🔗 玩法独立性',
        '机制设计-品类': '🏷️ 品类',
        '机制设计-16乐趣标签': '✨ 乐趣标签',
        '机制设计-情绪反馈': '💫 情绪反馈',
        '机制设计-交互关系': '🤝 交互关系',
        '玩法层级-生命周期阶段': '📈 生命周期'
      };
      // 前4个（对抗类型、玩法规模、内容消耗、解决痛点）显示在侧边栏常驻区
      // 其余含生命周期在"更多筛选"中
      const quickKeys = ['玩法层级-对抗类型', '玩法层级-玩法规模', '玩法层级-内容消耗模式', '解决痛点'];
      const extraKeys = Object.keys(catTitles).filter(k => !quickKeys.includes(k));
      function renderCats(keys) {
        var html = '';
        keys.forEach(function(cat) {
          var counts = categories[cat];
          if (!counts || Object.keys(counts).length === 0) return;
          html += '<div class="filter-category">';
          html += '<div class="filter-category-title">' + catTitles[cat] + '</div>';
          html += '<div class="filter-tags">';
          Object.entries(counts).sort(function(a,b){return b[1]-a[1];}).forEach(function(pair) {
            var tag=pair[0], count=pair[1];
            var sel = selectedFilters[cat] && selectedFilters[cat].includes(tag);
            var cls = 'filter-tag' + (sel ? ' selected' : '');
            // 使用 data- 属性，避免任何字符串拼接转义问题
            html += '<span class="' + cls + '" data-cat="' + cat.replace(/"/g,'&quot;') + '" data-tag="' + tag.replace(/"/g,'&quot;') + '">' + tag + '<span class="filter-tag-count">(' + count + ')</span></span>';
          });
          html += '</div></div>';
        });
        return html;
      }
      var filterBody = document.getElementById('filterBody');
      if (filterBody) {
        filterBody.innerHTML = renderCats(quickKeys);
        filterBody.querySelectorAll('.filter-tag').forEach(function(el) {
          el.addEventListener('click', function() {
            toggleFilterTag(this.dataset.cat, this.dataset.tag);
          });
        });
      }
      var extraFilters = document.getElementById('extraFilters');
      if (extraFilters) {
        extraFilters.innerHTML = renderCats(extraKeys);
        extraFilters.querySelectorAll('.filter-tag').forEach(function(el) {
          el.addEventListener('click', function() {
            toggleFilterTag(this.dataset.cat, this.dataset.tag);
          });
        });
      }
    }
    
    // Toggle extra filters in sidebar
    function toggleFilter() {
      var extraFilters = document.getElementById('extraFilters');
      var btn = document.getElementById('filterBtn');
      if (!extraFilters) return;
      if (extraFilters.classList.contains('hidden')) {
        extraFilters.classList.remove('hidden');
        if (btn) { btn.textContent = '收起筛选 ▲'; btn.classList.add('active'); }
      } else {
        extraFilters.classList.add('hidden');
        if (btn) { btn.textContent = '更多筛选 ▼'; btn.classList.remove('active'); }
      }
    }

    // 初始化品类栏：绑定点击事件
    function initCategoryBar() {
      const categoryTabs = document.querySelectorAll('.category-tab');
      categoryTabs.forEach(tab => {
        tab.addEventListener('click', function() {
          toggleCategoryTab(this);
        });
      });
    }
    
    // 切换品类标签 - 展开/折叠子标签
    function toggleCategoryTab(tabElement) {
      const category = tabElement.getAttribute('data-cat');
      const categorySubtags = document.getElementById('categorySubtags');
      const isAlreadyActive = tabElement.classList.contains('active');
      
      // 移除所有其他tab的active class
      document.querySelectorAll('.category-tab').forEach(t => {
        t.classList.remove('active');
      });
      
      if (isAlreadyActive) {
        // 再次点击同一个tab - 折叠
        tabElement.classList.remove('active');
        categorySubtags.classList.add('hidden');
      } else {
        // 点击新的tab - 展开
        tabElement.classList.add('active');
        renderCategorySubtags(category);
        categorySubtags.classList.remove('hidden');
      }
    }
    
    // 渲染品类的子标签
    function renderCategorySubtags(category) {
      const categorySubtags = document.getElementById('categorySubtags');
      let html = '';
      
      // 从已有的categories数据中获取该分类的所有标签
      const categories = buildCategoriesData();
      
      if (categories[category] && Object.keys(categories[category]).length > 0) {
        Object.entries(categories[category])
          .sort((a, b) => b[1] - a[1])
          .forEach(([tag, count]) => {
            const selected = selectedFilters[category] && selectedFilters[category].includes(tag);
            // 使用 data- 属性避免 onclick 字符串拼接时中文/特殊字符转义问题
            html += '<span class="category-subtag ' + (selected ? 'selected' : '') + '" data-cat="' + category.replace(/"/g,'&quot;') + '" data-tag="' + tag.replace(/"/g,'&quot;') + '">' + tag + '</span>';
          });
      }
      
      categorySubtags.innerHTML = html;
      
      // 绑定点击事件（用 data 属性避免转义问题）
      categorySubtags.querySelectorAll('.category-subtag').forEach(function(el) {
        el.addEventListener('click', function() {
          toggleFilterTag(this.dataset.cat, this.dataset.tag);
        });
      });
    }
    
    // 构建分类数据
    function buildCategoriesData() {
      const categories = {
        '玩法层级-对抗类型': {},
        '玩法层级-玩法规模': {},
        '玩法层级-内容消耗模式': {},
        '解决痛点': {},
        '玩法层级-操作属性': {},
        '玩法层级-时间属性': {},
        '玩法层级-玩法重度': {},
        '玩法层级-玩法独立性': {},
        '机制设计-品类': {},
        '机制设计-16乐趣标签': {},
        '机制设计-情绪反馈': {},
        '机制设计-交互关系': {},
        '玩法层级-生命周期阶段': {}
      };
      
      // 统计各分类的标签
      Object.values(data.mechanisms).forEach(m => {
        // 玩法层级 - 从 playLevelTags 获取
        if (m.playLevelTags) {
          m.playLevelTags.forEach(t => {
            if (['PVP', 'PvPvE', 'PVE', '无对抗'].includes(t)) {
              categories['玩法层级-对抗类型'][t] = (categories['玩法层级-对抗类型'][t] || 0) + 1;
            } else if (['单人玩法', '双人玩法', '小队玩法', '多人玩法'].includes(t)) {
              categories['玩法层级-玩法规模'][t] = (categories['玩法层级-玩法规模'][t] || 0) + 1;
            } else if (['可重复', '一次性', '周期性', '可重复（持续运营）', '持续运营'].includes(t)) {
              categories['玩法层级-内容消耗模式'][t] = (categories['玩法层级-内容消耗模式'][t] || 0) + 1;
            } else if (['Endgame', '新手引导期', '成长中期'].includes(t)) {
              categories['玩法层级-生命周期阶段'][t] = (categories['玩法层级-生命周期阶段'][t] || 0) + 1;
            } else if (['即时操作', '半即时操作', '回合操作', '放置操作', '放置操作（轻操作）'].includes(t)) {
              categories['玩法层级-操作属性'][t] = (categories['玩法层级-操作属性'][t] || 0) + 1;
            } else if (t.includes('分钟')) {
              categories['玩法层级-时间属性'][t] = (categories['玩法层级-时间属性'][t] || 0) + 1;
            } else if (['核心玩法', '副玩法', '轻度玩法'].includes(t)) {
              categories['玩法层级-玩法重度'][t] = (categories['玩法层级-玩法重度'][t] || 0) + 1;
            } else if (['高耦合', '低耦合'].includes(t)) {
              categories['玩法层级-玩法独立性'][t] = (categories['玩法层级-玩法独立性'][t] || 0) + 1;
            }
          });
        }
        
        // 解决痛点 - 从 painPoints 获取（只显示标准化的痛点）
        const PAIN_POINT_WHITELIST = [
          '内容枯竭痛点', '经济成本痛点', '时间成本痛点', '挫败感痛点',
          '社交压力痛点', '策略深度痛点', '自由度痛点', '节奏单一痛点',
          '操作门槛痛点', '内容枯竭痛点', '成长枯竭痛点'
        ];
        if (m.painPoints) {
          m.painPoints.forEach(t => {
            // 只显示标准化的痛点（包含"痛点"后缀的）
            if (t.endsWith('痛点') || PAIN_POINT_WHITELIST.some(w => t.includes(w))) {
              categories['解决痛点'][t] = (categories['解决痛点'][t] || 0) + 1;
            }
          });
        }
        
        // 机制设计 - 从 mechanismDesign 获取
        if (m.mechanismDesign) {
          m.mechanismDesign.forEach(t => {
            categories['机制设计-品类'][t] = (categories['机制设计-品类'][t] || 0) + 1;
          });
        }
        
        // 16乐趣标签
        if (m.mechanismDesignFun) {
          m.mechanismDesignFun.forEach(t => {
            categories['机制设计-16乐趣标签'][t] = (categories['机制设计-16乐趣标签'][t] || 0) + 1;
          });
        }
        
        // 情绪反馈
        if (m.mechanismDesignEmotion) {
          m.mechanismDesignEmotion.forEach(t => {
            categories['机制设计-情绪反馈'][t] = (categories['机制设计-情绪反馈'][t] || 0) + 1;
          });
        }
        
        // 交互关系
        if (m.mechanismDesignInteraction) {
          m.mechanismDesignInteraction.forEach(t => {
            categories['机制设计-交互关系'][t] = (categories['机制设计-交互关系'][t] || 0) + 1;
          });
        }
      });
      
      return categories;
    }
    
    // 切换单个标签
    function toggleFilterTag(category, tag) {
      if (!selectedFilters[category]) {
        selectedFilters[category] = [];
      }
      
      const idx = selectedFilters[category].indexOf(tag);
      if (idx >= 0) {
        selectedFilters[category].splice(idx, 1);
      } else {
        selectedFilters[category].push(tag);
      }
      
      renderFilterPanel();
      currentPage = 1;
      renderGrid();
    }
    
    // 清除筛选
    function clearFilter() {
      selectedFilters = {};
      // 同时清除品类 tab 激活状态
      document.querySelectorAll('.genre-tab').forEach(t => t.classList.remove('active'));
      renderFilterPanel();
      currentPage = 1;
      renderGrid();
    }
    
    function renderStats() {
      document.getElementById('mechCount').textContent = data.stats.mechanismCount;
      document.getElementById('gameCount').textContent = data.stats.gameCount;
    }
    
    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        // Show/hide sidebar based on tab
        var sidebar = document.getElementById('filterPanel');
        if (sidebar) {
          if (currentTab === 'mechanisms') {
            sidebar.style.display = '';
          } else {
            sidebar.style.display = 'none';
          }
        }
        currentPage = 1; // 重置到第一页
        renderGrid();
      });
    });
    
    // Search
    document.getElementById('searchInput').addEventListener('input', renderGrid);
    
    // 渲染卡片标签 - 支持新标签系统，显示所有标签
    function renderCardTags(m) {
      const tags = [];
      
      // 玩法层级 - 全部显示
      if (m.playLevelTags && m.playLevelTags.length > 0) {
        tags.push(...m.playLevelTags);
      }
      // 机制设计 - 全部显示
      if (m.mechanismDesign && m.mechanismDesign.length > 0) {
        tags.push(...m.mechanismDesign);
      }
      // 特色机制 - 全部显示
      if (m.specialMechanisms && m.specialMechanisms.length > 0) {
        tags.push(...m.specialMechanisms);
      }
      // 玩家痛点 - 全部显示
      if (m.painPoints && m.painPoints.length > 0) {
        tags.push(...m.painPoints);
      }
      
      // 如果没有新标签，回退到旧 tags
      if (tags.length === 0 && m.tags && m.tags.length > 0) {
        tags.push(...m.tags);
      }
      
      return tags.map(t => `<span class="tag" onclick="event.stopPropagation(); searchByTag('${t}')">${t}</span>`).join('');
    }
    
    function getFilteredData() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      
      if (currentTab === 'mechanisms') {
        return Object.entries(data.mechanisms).filter(([key, m]) => {
          // 多个关键词用空格分隔，支持交集搜索
          const keywords = query.trim().split(/\s+/).filter(k => k);
          
          // 收集所有可能的标签字段
          const allTags = [
            ...(m.tags || []),
            ...(m.flatTags || []),
            ...(m.playLevelTags || []),
            ...(m.mechanismDesign || []),
            ...(m.specialMechanisms || []),
            ...(m.painPoints || [])
          ];
          
          const matchQuery = keywords.length === 0 || keywords.every(kw => 
            m.title.toLowerCase().includes(kw) ||
            m.gameName?.toLowerCase().includes(kw) ||
            m.simpleDesc?.toLowerCase().includes(kw) ||
            allTags.some(t => t.toLowerCase().includes(kw))
          );
          
          // 品类筛选（__genre__ 特殊 key，匹配 mechanismDesignCategory）
          if (selectedFilters['__genre__']) {
            const { variants } = selectedFilters['__genre__'];
            const cats = m.mechanismDesignCategory || [];
            if (!variants.some(v => cats.includes(v))) return false;
          }
          
          // 其他标签筛选：必须满足所有选中的分类
          let matchFilter = true;
          for (const [category, tags] of Object.entries(selectedFilters)) {
            if (category === '__genre__') continue;  // 已单独处理
            if (tags.length === 0) continue;
            
            // 检查该机制的标签是否包含任一选中的标签
            let hasMatch = false;
            for (const tag of tags) {
              if (allTags.includes(tag)) {
                hasMatch = true;
                break;
              }
            }
            if (!hasMatch) {
              matchFilter = false;
              break;
            }
          }
          
          return matchQuery && matchFilter;
        });
      } else {
        return Object.entries(data.games).filter(([key, g]) => {
          const matchQuery = !query ||
            g.title.toLowerCase().includes(query) ||
            g.gameName?.toLowerCase().includes(query) ||
            g.xStatement?.toLowerCase().includes(query);
          return matchQuery;
        });
      }
    }
    
    function renderPagination(totalItems) {
      const pagination = document.getElementById('pagination');
      const totalPages = Math.ceil(totalItems / PAGE_SIZE);
      
      if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
      }
      
      let html = '';
      
      // 上一页
      html += `<button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
      
      // 页码
      const maxVisiblePages = 5;
      let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
      let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
      
      if (endPage - startPage < maxVisiblePages - 1) {
        startPage = Math.max(1, endPage - maxVisiblePages + 1);
      }
      
      // 第一页
      if (startPage > 1) {
        html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) html += `<span style="padding: 0.5rem;">...</span>`;
      }
      
      // 中间页码
      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      
      // 最后一页
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span style="padding: 0.5rem;">...</span>`;
        html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
      }
      
      // 下一页
      html += `<button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
      
      // 总数信息
      html += `<span style="margin-left: 1rem; color: var(--text-secondary); font-size: 0.9rem;">共 ${totalItems} 条</span>`;
      
      pagination.innerHTML = html;
    }
    
    function goToPage(page) {
      currentPage = page;
      renderGrid();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function renderGrid() {
      const grid = document.getElementById('grid');
      const empty = document.getElementById('empty');
      filteredData = getFilteredData();
      
      if (filteredData.length === 0) {
        grid.innerHTML = '';
        document.getElementById('pagination').innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      
      empty.classList.add('hidden');
      
      // 分页切片
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageData = filteredData.slice(start, end);
      
      // 渲染分页控件
      renderPagination(filteredData.length);

      // 标准化游戏名：移除逗号、斜杠等分隔符，统一为空格
      const normalize = (s) => s.replace(/[,/\\].*$/, '').trim().toLowerCase();
      const normInput = normalize(gameName);
      
      // 尝试提取有效的游戏名进行匹配
      const namesToTry = [];
      
      // 1. 直接用原名
      namesToTry.push(gameName);
      
      // 2. 清理逗号/斜杠分隔的多个名字
      if (gameName.includes(',') || gameName.includes('/')) {
        gameName.split(/[,/]/).forEach(n => namesToTry.push(n.trim()));
      }
      
      // 3. 提取第一个有效名字（通常是英文名）
      const firstName = gameName.split(/[,/]/)[0].trim();
      if (firstName) namesToTry.push(firstName);
      
      // 尝试每个名字
      for (const name of namesToTry) {
        // 先尝试映射表
        if (GAME_NAME_MAP[name] && data.games[GAME_NAME_MAP[name]]) {
          showGame(GAME_NAME_MAP[name]);
          return;
        }
        
        // 再尝试模糊匹配
        const entry = Object.entries(data.games).find(([key, g]) => 
          g.title.toLowerCase().includes(name.toLowerCase()) ||
          g.gameName?.toLowerCase().includes(name.toLowerCase()) ||
          normalize(g.gameName) === normInput
        );
        if (entry) {
          showGame(entry[0]);
          return;
        }
      }
    }
    
    function closeModal() {
      document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
    }
    
    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeModal();
      });
    });
    
    // Close modal on escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    // Init
    loadData();
    window.addEventListener('resize', alignLatestSidebar);
  </script>
</body>
</html>
